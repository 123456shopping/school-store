<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳戶儲值 - 學生端</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .topup-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            margin: 50px auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .amount-btn {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border: 1px solid hsl(211, 87%, 82%);
            background: white;
            border-radius: 5px;
            font-size: 1.1em;
            transition: 0.3s;
        }
        .amount-btn:hover {
            background: hsl(211, 89%, 36%);
            color: white;
        }
        #qrcode {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        #qr-hint {
            margin-top: 10px;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>合作社線上系統</h1>
        <nav>
            <ul>
                <li><a href="home.html">回首頁</a></li>
                <li><a href="history.html">交易紀錄</a></li>
            </ul>
        </nav>
    </header>

    <div class="topup-container">
        <h2>請選擇儲值金額</h2>
        <button class="amount-btn" onclick="generateTopupQR(50)">$100</button>
        <button class="amount-btn" onclick="generateTopupQR(100)">$200</button>
        <button class="amount-btn" onclick="generateTopupQR(500)">$500</button>

        <div id="qrcode"></div>
        <p id="qr-hint">請出示此畫面給管理員掃描</p>
    </div>

    <script>
        function generateTopupQR(amount) {
            const studentID = localStorage.getItem('studentID');
            if (!studentID) {
                alert("登入逾時，請重新登入");
                window.location.href = "index.html";
                return;
            }

            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // 清除舊碼
            document.getElementById("qr-hint").style.display = "block";

            // 取得當前網址路徑，組合成管理員掃描頁面的連結
            const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            // 格式：admin_scan.html?sid=學號&amount=金額&t=時間戳(防快取)
            const qrUrl = `${baseUrl}/admin_scan.html?sid=${studentID}&amount=${amount}&t=${new Date().getTime()}`;

            new QRCode(qrContainer, {
                text: qrUrl,
                width: 200,
                height: 200,
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    </script>
</body>
</html>
