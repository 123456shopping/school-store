<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e9ecef;
            font-family: Arial, sans-serif, "Microsoft JhengHei", "微軟正黑體";
            color: #333;
        }


        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 30px;
            color: hsl(211, 89%, 36%);
            font-size: 1.8em;
        }


        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .input-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: hsl(211, 89%, 36%);
            outline: none;
        }


        .reset-button {
            width: 100%;
            padding: 12px;
            background-color: #0b9bdd;
            color: #333;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        .reset-button:hover {
            background-color:#0589c6;
        }


        .links {
            margin-top: 25px;
        }

        .links a {
            color: hsl(211, 89%, 36%);
            text-decoration: none;
            font-size: 0.9em;
            margin: 0 10px;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #0056b3;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>忘記密碼？</h2>
        <p style="color: #6c757d; margin-bottom: 25px;">請輸入您的學號，以便我們提供重設密碼的指示。</p>

        <form action="#" method="post" class="reset-form">

            <div class="input-group">
                <label for="studentID">電子郵件</label>
                <input type="text" id="studentID" name="studentID" placeholder="請輸入您的電子郵件" required>
            </div>

            <button type="submit" class="reset-button" style="color: rgb(255, 255, 255);">確認學號</button>

            <div class="links">
                <a href="index.html">返回登入頁面</a>
                <a href="register.html">註冊新帳號</a>
            </div>
        </form>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>

        const firebaseConfig = {

            apiKey: "AIzaSyBzIDaKy4StkqJF_dwYHxpA6SjXRac45YM",
            authDomain: "xinnini1222.firebaseapp.com",
            projectId: "xinnini1222",
            storageBucket: "xinnini1222.firebasestorage.app",
            messagingSenderId: "829700121475",
            appId: "1:829700121475:web:baf568b0060bf93ede8cb6",
            measurementId: "G-MCM390KX11"
        };
        firebase.initializeApp(firebaseConfig);


        const auth = firebase.auth();




        function handlePasswordReset(event) {
            event.preventDefault();


            const email = document.getElementById('studentID').value;

            document.querySelector('.reset-button').textContent = '發送中...';
            document.querySelector('.reset-button').disabled = true;


            auth.sendPasswordResetEmail(email)
                .then(() => {

                    alert(`密碼重設郵件已發送到 ${email}！請檢查您的收件箱。`);
                    window.location.href = "index.html";
                })
                .catch((error) => {

                    let errorMessage = '發送失敗，請稍後再試。';
                    if (error.code === 'auth/invalid-email') {
                        errorMessage = '電子郵件地址格式錯誤。';
                    } else if (error.code === 'auth/user-not-found') {
                        errorMessage = '查無此電子郵件的帳戶，請確認輸入是否正確。';
                    }
                    console.error("發送密碼重設郵件錯誤:", error);
                    alert(errorMessage);
                })
                .finally(() => {
                    document.querySelector('.reset-button').textContent = '確認電子郵件';
                    document.querySelector('.reset-button').disabled = false;
                });
        }


        document.querySelector('.reset-form').addEventListener('submit', handlePasswordReset);

    </script>
</body>

</html>
