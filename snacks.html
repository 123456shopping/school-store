<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>服務項目 - 零食專區</title>
    <style>
        /* 統一商品卡片樣式 */
        .product-card {
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 12px;
            width: 240px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .img-container {
            width: 100%;
            height: 160px;
            background-color: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .price-text {
            color: #ff4d4f;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
        }

       .buy-btn {
    width: 100%;
    padding: 12px;
    background-color: #ffffff; /* 白底 */
    color: #000000;             /* 黑字 */
    border: 1px solid #000000;  /* 黑框 */
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    transition: all 0.3s ease;  /* 讓變色效果更平滑 */
}

/* 加上懸停效果：滑鼠移上去時反轉顏色，增加互動感 */
.buy-btn:hover {
    background-color: #d0cfcf; /* 變成黑底 */
    color: #ffffff;             /* 變成白字 */
}
    </style>
</head>

<body>
    <header>
        <h1>合作社線上系統</h1>
        <nav>
            <ul>
                <li><a href="home.html">回首頁</a></li>
                <li><a href="index.html">切換帳號</a></li>
                <li><a href="snacks.html">零食</a></li>
                <li><a href="contact.html">文具</a></li>
                <li><a href="drink.html">飲料</a></li>
                <li><a href="ice.html">冰品</a></li>
                <li><a href="desert.html">甜點</a></li>
                <li><a href="topup.html">儲值</a></li>
                <li><a href="cart.html" style="color: white; text-decoration: none; font-weight: bold;"> 我的購物車</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h2> 零食專區 </h2>
            <p>這裡充滿了很多零食</p>
        </section>

        <section id="snacks-list">
            <h2>所有零食</h2>
            <div id="product-container" style="display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; padding: 20px;">
                </div>
            <p id="loading-message" style="text-align: center;">正在載入零食清單...</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2025系 合作社線上統。版權所有。</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBzIDaKy4StkqJF_dwYHxpA6SjXRac45YM",
            authDomain: "xinnini1222.firebaseapp.com",
            projectId: "xinnini1222",
            storageBucket: "xinnini1222.firebasestorage.app",
            messagingSenderId: "829700121475",
            appId: "1:829700121475:web:baf568b0060bf93ede8cb6",
            measurementId: "G-MCM390KX11"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const productContainer = document.getElementById('product-container');
        const loadingMessage = document.getElementById('loading-message');
        
        // --- 修正點：將分類改回「零食」 ---
        const targetCategory = "零食"; 

        function loadSnackList() {
            productContainer.innerHTML = ''; 

            db.collection("products")
                .where("category", "==", targetCategory)
                .get()
                .then((querySnapshot) => {
                    loadingMessage.style.display = 'none';

                    if (querySnapshot.empty) {
                        productContainer.innerHTML = `<p>找不到分類為「${targetCategory}」的商品。</p>`;
                        return;
                    }

                    querySnapshot.forEach((doc) => {
                        const product = doc.data();

                        // --- 核心邏輯：圖片檢查 ---
                        let imgUrl = product.imageUrl;
                        if (!imgUrl || imgUrl === "" || imgUrl.includes("資料庫無網址")) {
                            imgUrl = "https://via.placeholder.com/300x200?text=No+Image";
                        }

                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'product-card';

                        itemDiv.innerHTML = `
                            <div class="img-container">
                                <img src="${imgUrl}" alt="${product.name}">
                            </div>
                            <h3>${product.name}</h3>
                            <p class="price-text">價格: $${product.price}</p>
                            <button class="buy-btn" onclick="addToCart('${doc.id}', '${product.name}', ${product.price})">
                                加入購物車
                            </button>
                        `;

                        productContainer.appendChild(itemDiv);
                    });
                })
                .catch((error) => {
                    console.error("載入失敗:", error);
                    loadingMessage.textContent = '載入失敗，請檢查 Firebase 設定。';
                });
        }

        loadSnackList();

        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existingProduct = cart.find(item => item.id === id);

            if (existingProduct) {
                existingProduct.quantity += 1;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            alert(name + " 已加入購物車！");
        }
    </script>
</body>
</html>
