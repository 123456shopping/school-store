<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合作社管理員 - 掃描儲值</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        #reader { width: 100%; max-width: 400px; margin: auto; background: white; border: 2px solid #333; }
        .result-box { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        .btn-retry { margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>管理員儲值掃描系統</h2>
    
    <div id="reader"></div>

    <div id="status" class="result-box">
        <h3 id="msg-title"></h3>
        <p id="msg-body"></p>
        <button class="btn-retry" onclick="location.href='admin_scan.html'">繼續掃描下一個</button>
    </div>

    <script>
        // --- Firebase 配置 (請確保與你的專案一致) ---
        var firebaseConfig = {
            apiKey: "AIzaSyBzIDaKy4StkqJF_dwYHxpA6SjXRac45YM",
            authDomain: "xinnini1222.firebaseapp.com",
            projectId: "xinnini1222",
            storageBucket: "xinnini1222.firebasestorage.app",
            messagingSenderId: "1071285094200",
            appId: "1:1071285094200:web:baf568b0060bf93ede8cb6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sid = urlParams.get('sid');
            const amount = parseInt(urlParams.get('amount'));

            // 邏輯：如果網址有參數，代表剛剛掃完碼跳過來
            if (sid && amount) {
                handleAdminAuth(sid, amount);
            } else {
                startScanner();
            }
        };

        // 啟動相機掃描
        function startScanner() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    // 如果掃到的內容包含 admin_scan.html，就跳轉
                    if (decodedText.includes('admin_scan.html')) {
                        html5QrCode.stop();
                        window.location.href = decodedText;
                    }
                }
            ).catch(err => console.error("掃描器啟動失敗", err));
        }

        // 管理員驗證與儲值執行
        function handleAdminAuth(sid, amount) {
            const password = prompt(`【儲值確認】\n對象學號：${sid}\n儲值金額：$${amount}\n\n請輸入管理員密碼執行儲值：`);

            if (password === "1234") { // 這裡設定你的管理員密碼
                executeTopup(sid, amount);
            } else if (password !== null) {
                alert("密碼錯誤，操作已取消。");
                location.href = "admin_scan.html";
            } else {
                location.href = "admin_scan.html";
            }
        }

        async function executeTopup(sid, amount) {
            const userRef = db.collection("users").doc(sid);
            try {
                const doc = await userRef.get();
                if (doc.exists) {
                    const newBalance = (doc.data().balance || 0) + amount;
                    
                    // 1. 更新餘額
                    await userRef.update({ balance: newBalance });

                    // 2. 寫入交易紀錄
                    await db.collection("orders").add({
                        studentID: sid,
                        amount: amount,
                        type: "儲值",
                        timestamp: new Date().toLocaleString('zh-TW')
                    });

                    // 3. 顯示結果
                    document.getElementById('reader').style.display = 'none';
                    document.getElementById('status').style.display = 'block';
                    document.getElementById('msg-title').innerText = "✅ 儲值成功";
                    document.getElementById('msg-body').innerText = `學號：${sid}\n儲值：$${amount}\n目前餘額：$${newBalance}`;
                } else {
                    alert("找不到該學生資料");
                    location.href = "admin_scan.html";
                }
            } catch (error) {
                console.error("儲值失敗:", error);
                alert("系統錯誤，儲值失敗");
            }
        }
    </script>
</body>
</html>
