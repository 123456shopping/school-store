<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員儲值確認</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f4f4f4; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 15px; }
        .info-box { text-align: left; background: #eee; padding: 15px; border-radius: 8px; margin: 20px 0; }
        #status-msg { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

    <div class="container">
        <h2>儲值授權驗證</h2>
        <div id="process-ui">
            <p id="loading-text">正在讀取資料...</p>
        </div>

        <div id="result-ui" style="display: none;">
            <div class="info-box" id="msg-body"></div>
            <div id="status-msg"></div>
            <a href="home.html" class="btn">回管理首頁</a>
        </div>
    </div>

    <script>
        // --- Firebase 配置 ---
        var firebaseConfig = {
            apiKey: "AIzaSyBzIDaKy4StkqJF_dwYHxpA6SjXRac45YM",
            authDomain: "xinnini1222.firebaseapp.com",
            projectId: "xinnini1222",
            storageBucket: "xinnini1222.firebasestorage.app",
            messagingSenderId: "1071285094200",
            appId: "1:1071285094200:web:baf568b0060bf93ede8cb6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 設定管理員授權密碼 (你可以自行修改)
        const ADMIN_PASSWORD = "1234"; 

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sid = urlParams.get('sid');
            const amount = parseInt(urlParams.get('amount'));

            if (sid && amount) {
                // 第一關：確認基本資訊
                if (confirm(`準備為學號 ${sid} 儲值 $${amount}\n按確定後請輸入授權密碼。`)) {
                    
                    // 第二關：輸入密碼
                    const pwd = prompt("請輸入管理員授權密碼：");
                    
                    if (pwd === ADMIN_PASSWORD) {
                        doTopup(sid, amount);
                    } else if (pwd !== null) {
                        alert("密碼錯誤，儲值失敗！");
                        window.location.href = "home.html";
                    } else {
                        window.location.href = "home.html"; // 使用者按取消
                    }
                } else {
                    window.location.href = "home.html";
                }
            } else {
                document.getElementById('process-ui').innerHTML = "<p class='error'>錯誤：無效的儲值連結</p>";
            }
        };

        function doTopup(sid, amount) {
            document.getElementById('loading-text').innerText = "處理中，請稍候...";
            const userRef = db.collection("users").doc(sid);
            
            userRef.get().then(doc => {
                if (doc.exists) {
                    const oldBalance = doc.data().balance || 0;
                    const newBalance = oldBalance + amount;
                    
                    userRef.update({ balance: newBalance }).then(() => {
                        showResult(true, `<b>儲值成功！</b><br>學號：${sid}<br>原餘額：$${oldBalance}<br>儲值金額：$${amount}<br><b>目前餘額：$${newBalance}</b>`);
                        
                        // 寫入交易紀錄
                        db.collection("orders").add({
                            studentID: sid,
                            type: "儲值",
                            amount: amount,
                            timestamp: new Date().toLocaleString()
                        });
                    });
                } else {
                    showResult(false, "找不到此學生帳號。");
                }
            }).catch(error => {
                showResult(false, "系統錯誤：" + error.message);
            });
        }

        function showResult(isSuccess, message) {
            document.getElementById('process-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            document.getElementById('msg-body').innerHTML = message;
            
            const statusMsg = document.getElementById('status-msg');
            if (isSuccess) {
                statusMsg.innerText = "✅ 儲值程序已完成";
                statusMsg.className = "success";
            } else {
                statusMsg.innerText = "❌ 處理失敗";
                statusMsg.className = "error";
            }
        }
    </script>
</body>
</html>
